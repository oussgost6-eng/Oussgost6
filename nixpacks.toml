[phases.setup]
nixPkgs = [
  "nodejs",
  "python3",
  "chromium",
  "nss",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "libxcomposite",
  "libxdamage",
  "libxrandr",
  "libgbm",
  "libasound"
]

[phases.install]
commands = [
  "pip install -r requirements.txt",
  "python -m playwright install --with-deps chromium"
]

[phases.start]
commands = ["python bot.py"]